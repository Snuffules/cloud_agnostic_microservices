apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: services-gcp
  namespace: argocd
spec:
  generators:
    - list:
        elements:
        - service: checkout
        - service: payment
        - service: inventory
        - service: user

  template:
    metadata:
      name: "{{service}}-gcp"
      namespace: argocd
    spec:
      project: apps

      source:
        repoURL: https://github.com/Snuffules/cloud_agnostic_microservices.git
        targetRevision: main
        path: k8s/services/{{service}}/overlays/gcp

      destination:
        server: https://kubernetes.default.svc
        namespace: apps

      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
