apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

generatorOptions:
  disableNameSuffixHash: true

images:
  - name: checkout-image
    newName: ACCOUNT_ID.dkr.ecr.REGION.amazonaws.com/checkout
    newTag: v1.0.0

configMapGenerator:
  - name: checkout-config
    namespace: apps
    literals:
      - CLOUD_PROVIDER=aws
      - SERVICE_NAME=checkout

patches:
  - path: serviceaccount-patch.yaml
