apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

generatorOptions:
  disableNameSuffixHash: true

images:
  - name: user-image
    newName: europe-west1-docker.pkg.dev/PROJECT_ID/apps/user
    newTag: v1.0.0

configMapGenerator:
  - name: user-config
    namespace: apps
    literals:
      - CLOUD_PROVIDER=gcp
      - SERVICE_NAME=user

patches:
  - path: serviceaccount-patch.yaml
