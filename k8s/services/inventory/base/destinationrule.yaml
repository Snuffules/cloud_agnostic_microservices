apiVersion: networking.istio.io/v1
kind: DestinationRule
metadata:
  name: inventory
  namespace: apps
spec:
  host: inventory.apps.svc.cluster.local
  trafficPolicy:
    tls:
      mode: ISTIO_MUTUAL
    outlierDetection:
      consecutive5xxErrors: 5
      interval: 30s
      baseEjectionTime: 30s
      maxEjectionPercent: 50
