apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment
  namespace: apps
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: payment
  template:
    metadata:
      labels:
        app.kubernetes.io/name: payment
        app.kubernetes.io/part-of: cloud-agnostic-platform
    spec:
      serviceAccountName: payment
      containers:
        - name: payment
          image: payment-image
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: payment-config
                optional: true
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
