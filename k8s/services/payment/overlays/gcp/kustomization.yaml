apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

generatorOptions:
  disableNameSuffixHash: true

images:
  - name: payment-image
    newName: europe-west1-docker.pkg.dev/PROJECT_ID/apps/payment
    newTag: v1.0.0

configMapGenerator:
  - name: payment-config
    namespace: apps
    literals:
      - CLOUD_PROVIDER=gcp
      - SERVICE_NAME=payment

patches:
  - path: serviceaccount-patch.yaml
