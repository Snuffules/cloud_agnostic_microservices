apiVersion: networking.istio.io/v1
kind: VirtualService
metadata:
  name: checkout
  namespace: apps
spec:
  hosts:
    - "*"
  gateways:
    - public-gateway
  http:
    - match:
        - uri:
            prefix: /checkout
      rewrite:
        uri: /
      route:
        - destination:
            host: checkout.apps.svc.cluster.local
            port:
              number: 80
